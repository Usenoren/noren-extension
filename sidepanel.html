<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noren</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <script>
      try {
        var t = localStorage.getItem("noren:theme");
        var light = ["classic","washi","kumo"];
        if (t) {
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.setAttribute("data-theme-mode", light.indexOf(t) >= 0 ? "light" : "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "kon");
          document.documentElement.setAttribute("data-theme-mode", "dark");
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/sidepanel.ts"></script>
  </body>
</html>
