<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440, height=280">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 440px;
    height: 280px;
    overflow: hidden;
    background: #1E3148;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    width: 100%;
    height: 100%;
    justify-content: center;
    padding: 0 40px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .brand-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #D4663A;
    box-shadow: 0 0 0 3px rgba(212, 102, 58, 0.2);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(212, 102, 58, 0.2); }
    50% { box-shadow: 0 0 0 6px rgba(212, 102, 58, 0); }
  }
  .brand-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: #D4663A;
    text-transform: uppercase;
  }
  .headline {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 25px;
    line-height: 1.2;
    color: #E8EDF2;
    letter-spacing: -0.015em;
  }
  .rule {
    width: 60px;
    height: 1px;
    background: #D4663A;
    opacity: 0.5;
    margin: 15px auto;
  }
  .actions {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #8A93A6;
  }
  .footer {
    position: absolute;
    bottom: 10px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(232, 237, 242, 0.35);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Noren</span>
  </div>
  <div class="headline">
    Writing That Sounds<br>Like You
  </div>
  <div class="rule"></div>
  <div class="actions">Rewrite &middot; Reply &middot; Fix</div>
  <div class="footer">Chrome Extension</div>
</div>
</body>
</html>
